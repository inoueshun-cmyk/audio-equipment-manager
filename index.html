<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FJN SoundStock</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;color:#1a1a1a;background:#f0f2f5;min-height:100vh}
button{cursor:pointer;border:1px solid #ccc;background:#fff;border-radius:6px;padding:5px 12px;font-size:13px;-webkit-tap-highlight-color:transparent}
button:hover{background:#f0f0f0}
input,select,textarea{border:1px solid #ccc;border-radius:6px;padding:8px 10px;font-size:14px;width:100%;outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:#555}
label{font-size:12px;color:#6b7a95;display:block;margin-bottom:3px}
.nav{background:#0f1f3d;color:#fff;display:flex;align-items:center;padding:0 1rem;position:sticky;top:0;z-index:10;min-height:50px}
.nav-title{font-weight:600;font-size:15px;letter-spacing:0.5px;margin-right:auto}
.nav-user{font-size:11px;background:rgba(255,255,255,0.15);padding:2px 10px;border-radius:10px;margin-right:8px;color:#fff}
.nav-logout{background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:12px;padding:4px 10px}
.top-nav{background:#e8edf4;border-bottom:1px solid #e2e6ec;display:flex;padding:0 1rem;overflow-x:auto}
.top-nav::-webkit-scrollbar{display:none}
.tnav-btn{background:none;border:none;border-bottom:2px solid transparent;padding:0.6rem 0;font-size:13px;color:#4a5568;border-radius:0;white-space:nowrap;flex-shrink:0;margin-right:1rem}
.tnav-btn.active{color:#0f1f3d;border-bottom-color:#4a8fe8;font-weight:600}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e6ec;z-index:10}
.bottom-nav-inner{display:flex}
.bnav-btn{flex:1;background:none;border:none;border-radius:0;padding:8px 4px 6px;font-size:10px;color:#6b7a95;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent}
.bnav-btn.active{color:#0f1f3d;border-top-color:#4a8fe8}
.bnav-icon{font-size:18px;line-height:1}
.content{padding:1rem;max-width:1100px;margin:0 auto;padding-bottom:80px}
.card{background:#fff;border:0.5px solid #e2e6ec;border-radius:8px;padding:1rem;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:600;color:#6b7a95;margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.6px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
.metric{background:#fff;border:0.5px solid #e2e6ec;border-radius:8px;padding:0.75rem}
.metric-label{font-size:10px;color:#6b7a95;margin-bottom:3px}
.metric-val{font-size:18px;font-weight:600;color:#0f1f3d}
.alert-box{background:#faeeda;border-left:3px solid #fac775;border-radius:0 6px 6px 0;padding:0.75rem 1rem;margin-bottom:1rem;font-size:13px;color:#633806}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:1.25rem;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-weight:500;font-size:15px;margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row{margin-bottom:10px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;color:#fff;font-weight:500}
.cat-pill{display:inline-block;width:52px;text-align:center;background:#f0f2f5;border:0.5px solid #e2e6ec;color:#6b7a95;font-size:10px;padding:2px 0;border-radius:3px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.table-wrap::-webkit-scrollbar{height:4px}
.table-wrap::-webkit-scrollbar-thumb{background:#b0b8c6;border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
th{padding:7px 12px;text-align:left;color:#6b7a95;font-weight:500;font-size:11px;border-bottom:0.5px solid #e2e6ec;white-space:nowrap;background:#f0f2f5}
td{padding:8px 12px;color:#0f1f3d;border-bottom:0.5px solid #e2e6ec;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f0f2f5}
.action-btn{border:0.5px solid #e2e6ec;background:none;color:#0f1f3d;font-size:11px;padding:2px 8px;border-radius:4px;cursor:pointer;margin-right:3px}
.action-btn.del{color:#a32d2d;border-color:transparent}
.ev-item{background:#fff;border:0.5px solid #e2e6ec;border-radius:8px;padding:10px 12px;cursor:pointer;margin-bottom:8px}
.ev-item.active{background:#f0f2f5;border-color:#999}
.preset-chip{display:inline-block;background:#f0f2f5;border:0.5px solid #e2e6ec;border-radius:16px;padding:4px 12px;font-size:12px;cursor:pointer;margin:3px;white-space:nowrap;color:#0f1f3d}
.preset-chip:hover{background:#e2e6ec}
.inline-input{border:none;border-bottom:1px solid #ccc;border-radius:0;padding:2px 4px;font-size:13px;width:100%;background:transparent}
.perm-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #f0f2f5;font-size:13px}
.perm-toggle:last-child{border-bottom:none}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:11px;transition:0.2s;cursor:pointer}
.toggle-slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.2s}
.toggle input:checked+.toggle-slider{background:#4a8fe8}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.member-card{background:#fff;border:0.5px solid #e2e6ec;border-radius:8px;padding:0.875rem;margin-bottom:0.75rem}
.member-name{font-weight:600;font-size:14px;color:#0f1f3d}
.member-role{font-size:11px;color:#6b7a95;margin-top:2px}
.pw-display{font-family:monospace;background:#f0f2f5;border-radius:4px;padding:3px 8px;font-size:13px;letter-spacing:1px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:#0f1f3d}
.login-card{background:#fff;border-radius:14px;padding:2rem;width:100%;max-width:360px}
.login-logo{font-size:22px;font-weight:700;letter-spacing:1px;margin-bottom:4px;color:#0f1f3d}
.login-sub{font-size:12px;color:#999;margin-bottom:1.5rem}
.login-err{color:#c00;font-size:13px;margin-top:8px}
.primary-btn{background:#0f1f3d;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:500}
.primary-btn:hover{background:#162850}
.danger-btn{background:none;color:#a32d2d;border:1px solid #a32d2d;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
@media(min-width:640px){
  .modal-bg{align-items:center}
  .modal{border-radius:12px;width:520px;max-height:85vh}
  .bottom-nav{display:none!important}
  .top-nav{display:flex}
  .content{padding:1.25rem;padding-bottom:1.25rem}
}
@media(max-width:639px){
  .bottom-nav{display:block}
  .top-nav{display:none}
  .form-grid{grid-template-columns:1fr}
}
@media print{
  body>*{display:none!important}
  #print-area{display:block!important;position:fixed;inset:0;padding:2rem;background:#fff}
}
</style>
</head>
<body>

<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">FJN SoundStock</div>
    <div class="login-sub">音響機材管理システム</div>
    <div class="form-row">
      <label>ユーザーを選択</label>
      <select id="login-user"><option value="">選択してください</option></select>
    </div>
    <div class="form-row">
      <label>パスワード</label>
      <input type="password" id="login-pass" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button onclick="doLogin()" style="width:100%;padding:10px;background:#0f1f3d;color:#fff;border:none;font-size:15px;font-weight:500;border-radius:8px;margin-top:4px">ログイン</button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>

<div id="app-screen" style="display:none">
  <div class="nav">
    <span class="nav-title">FJN SoundStock</span>
    <span class="nav-user" id="nav-user"></span>
    <button class="nav-logout" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="top-nav" id="top-nav"></div>
  <div class="content" id="main-content"></div>
  <div class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav"></div></div>
</div>

<div id="print-area" style="display:none"></div>
<div id="modal-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, remove, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC4CXb9hXIZhAbgHHNdOl65lf2gfM3E6OA",
  authDomain: "audio-equipment-manager.firebaseapp.com",
  databaseURL: "https://audio-equipment-manager-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "audio-equipment-manager",
  storageBucket: "audio-equipment-manager.firebasestorage.app",
  messagingSenderId: "560991550177",
  appId: "1:560991550177:web:8cc288a677cc0561dcd5a0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CATS = ["入力系","処理系","出力系","周辺"];
const STATUSES = ["良好","要注意","要修理","故障"];
const SC = {"良好":"#1D9E75","要注意":"#BA7517","要修理":"#D85A30","故障":"#A32D2D"};
const TODAY = new Date().toISOString().slice(0,10);

// 権限定義
const PERMS = [
  {key:"eq_edit", label:"機材の追加・編集・削除"},
  {key:"ev_edit", label:"イベントの追加・編集・削除"},
  {key:"ev_items", label:"機材リスト・費用項目の編集"},
  {key:"quote_edit", label:"見積書の作成・編集"},
  {key:"maintenance", label:"メンテナンス記録の追加"},
];

let equipment={}, events={}, maintenance={}, members={}, presets=[];
let currentTab="dashboard", selectedEventId=null, quoteEventId=null;
let currentUser=null; // {id, name, role, permissions:{...}}

const isAdmin = () => currentUser?.role === "admin";
const hasPerm = (key) => isAdmin() || currentUser?.permissions?.[key];

// ===== INIT =====
async function initDefaults() {
  const snap = await get(ref(db,"members"));
  if(!snap.exists()) {
    await set(ref(db,"members"), {
      admin: {name:"管理者", role:"admin", password:"admin123", permissions:{}}
    });
  }
  const pr = await get(ref(db,"presets"));
  if(!pr.exists()) {
    const defaults = ["オペレーター","アシスタント","搬入作業","搬出作業","車両費","駐車場費","雑費"];
    await set(ref(db,"presets"), defaults.reduce((o,p,i)=>(o[i]=p,o),{}));
  }
}

onValue(ref(db,"members"), s => {
  members = s.val() || {};
  updateLoginSelect();
  renderCurrentTab();
});
onValue(ref(db,"equipment"), s => { equipment=s.val()||{}; renderCurrentTab(); });
onValue(ref(db,"events"), s => { events=s.val()||{}; renderCurrentTab(); });
onValue(ref(db,"maintenance"), s => { maintenance=s.val()||{}; renderCurrentTab(); });
onValue(ref(db,"presets"), s => { presets=s.val()?Object.values(s.val()):[]; renderCurrentTab(); });

function updateLoginSelect() {
  const sel = document.getElementById("login-user");
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">選択してください</option>';
  Object.entries(members).forEach(([id,m]) => {
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = m.name + (m.role==="admin" ? "（管理者）" : "");
    sel.appendChild(opt);
  });
  if(cur) sel.value = cur;
}

// ===== LOGIN =====
window.doLogin = async function() {
  const uid = document.getElementById("login-user").value;
  const pass = document.getElementById("login-pass").value;
  if(!uid) { document.getElementById("login-err").textContent = "ユーザーを選択してください"; return; }
  const snap = await get(ref(db,"members/"+uid));
  if(!snap.exists()) { document.getElementById("login-err").textContent = "ユーザーが見つかりません"; return; }
  const m = snap.val();
  if(pass !== m.password) { document.getElementById("login-err").textContent = "パスワードが違います"; return; }
  currentUser = {id:uid, name:m.name, role:m.role, permissions:m.permissions||{}};
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "";
  document.getElementById("nav-user").textContent = m.name + (m.role==="admin"?"（管理者）":"");
  buildNav();
  showTab("dashboard");
}

window.doLogout = function() {
  currentUser = null;
  document.getElementById("login-screen").style.display = "";
  document.getElementById("app-screen").style.display = "none";
  document.getElementById("login-pass").value = "";
  document.getElementById("login-err").textContent = "";
}

// ===== NAV =====
function buildNav() {
  const tabs = [
    {id:"dashboard", icon:"🏠", label:"ホーム"},
    {id:"equipment", icon:"🎛", label:"機材"},
    {id:"events", icon:"📅", label:"イベント"},
    {id:"quote", icon:"📄", label:"見積"},
    {id:"maintenance", icon:"🔧", label:"点検"},
    {id:"mypage", icon:"👤", label:"マイページ"},
    ...(isAdmin() ? [{id:"settings", icon:"⚙️", label:"設定"}] : []),
  ];
  document.getElementById("top-nav").innerHTML = tabs.map(t =>
    `<button class="tnav-btn" data-tab="${t.id}" onclick="showTab('${t.id}')">${t.label}</button>`
  ).join("");
  document.getElementById("bottom-nav").innerHTML = tabs.map(t =>
    `<button class="bnav-btn" data-tab="${t.id}" onclick="showTab('${t.id}')"><span class="bnav-icon">${t.icon}</span>${t.label}</button>`
  ).join("");
}

window.showTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll("[data-tab]").forEach(b => b.classList.toggle("active", b.dataset.tab===tab));
  renderCurrentTab();
}

function renderCurrentTab() {
  if(!currentUser) return;
  const m = {
    dashboard: renderDashboard,
    equipment: renderEquipment,
    events: renderEvents,
    quote: renderQuote,
    maintenance: renderMaintenance,
    mypage: renderMyPage,
    settings: renderSettings,
  };
  if(m[currentTab]) m[currentTab]();
}

// ===== DASHBOARD =====
function renderDashboard() {
  const eqArr = Object.values(equipment);
  const totalAsset = eqArr.reduce((s,e)=>s+(e.qty||0)*(e.unitPrice||0),0);
  const needRepair = eqArr.filter(e=>e.status==="要修理"||e.status==="故障").length;
  const upcoming = Object.values(events).filter(e=>e.date>=TODAY).length;
  const alerts = eqArr.filter(e=>e.nextCheck&&e.nextCheck<=TODAY);

  const catBars = CATS.map(c=>{
    const cnt = eqArr.filter(e=>e.cat===c).reduce((s,e)=>s+(e.qty||0),0);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="width:52px;font-size:11px;color:#6b7a95">${c}</div>
      <div style="flex:1;background:#e2e6ec;border-radius:3px;height:7px">
        <div style="width:${Math.min(100,cnt*8)}%;background:linear-gradient(90deg,#162850,#4a8fe8);border-radius:3px;height:7px"></div>
      </div>
      <div style="font-size:11px;width:20px;text-align:right">${cnt}</div>
    </div>`;
  }).join("");

  const statusRows = STATUSES.map(s=>{
    const cnt = eqArr.filter(e=>e.status===s).length;
    return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid #f0f2f5">
      <span style="font-size:12px"><span style="width:7px;height:7px;border-radius:50%;background:${SC[s]};display:inline-block;margin-right:5px"></span>${s}</span>
      <span style="font-size:12px;font-weight:600">${cnt}件</span>
    </div>`;
  }).join("");

  document.getElementById("main-content").innerHTML = `
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">総機材種類</div><div class="metric-val">${eqArr.length}種</div></div>
      <div class="metric"><div class="metric-label">資産総額</div><div class="metric-val" style="font-size:14px">¥${totalAsset.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">要対応</div><div class="metric-val" style="color:${needRepair>0?"#D85A30":"inherit"}">${needRepair}件</div></div>
      <div class="metric"><div class="metric-label">今後のイベント</div><div class="metric-val">${upcoming}件</div></div>
      <div class="metric"><div class="metric-label">点検アラート</div><div class="metric-val" style="color:${alerts.length>0?"#BA7517":"inherit"}">${alerts.length}件</div></div>
    </div>
    ${alerts.length ? `<div class="alert-box"><strong>点検期限アラート（${alerts.length}件）</strong>${alerts.map(e=>`<div style="margin-top:3px">・${e.name}（${e.model||""}）— 期限: ${e.nextCheck}</div>`).join("")}</div>` : ""}
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem">
      <div class="card"><div class="card-title">カテゴリ別機材数</div>${catBars}</div>
      <div class="card"><div class="card-title">状態サマリー</div>${statusRows}</div>
    </div>`;
}

// ===== EQUIPMENT =====
let eqFilter="", eqCatFilter="すべて";
function renderEquipment() {
  const filtered = Object.entries(equipment).filter(([k,e])=>{
    const q = eqFilter.toLowerCase();
    return (!q||(e.name||"").includes(q)||(e.maker||"").includes(q)||(e.model||"").includes(q)) && (eqCatFilter==="すべて"||e.cat===eqCatFilter);
  });
  const rows = filtered.map(([k,e])=>`<tr>
    <td style="font-weight:500">${e.name||""}</td>
    <td style="color:#6b7a95">${e.maker||""}</td>
    <td style="color:#6b7a95">${e.model||""}</td>
    <td><span class="cat-pill">${e.cat||""}</span></td>
    <td style="text-align:center">${e.qty||0}</td>
    <td style="text-align:right">¥${(e.unitPrice||0).toLocaleString()}</td>
    <td><span class="badge" style="background:${SC[e.status]||"#999"}">${e.status||""}</span></td>
    <td style="color:#6b7a95">${e.location||""}</td>
    ${hasPerm("eq_edit") ? `<td><button class="action-btn" onclick="openEqModal('${k}')">編集</button><button class="action-btn del" onclick="delEq('${k}')">削除</button></td>` : "<td></td>"}
  </tr>`).join("");

  document.getElementById("main-content").innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
      <input placeholder="機材名・型番で検索" value="${eqFilter}" oninput="eqFC(this.value)" style="flex:1;min-width:140px">
      <select onchange="eqCC(this.value)" style="width:110px">${["すべて",...CATS].map(c=>`<option ${eqCatFilter===c?"selected":""}>${c}</option>`).join("")}</select>
      ${hasPerm("eq_edit") ? `<button class="primary-btn" onclick="openEqModal(null)">+ 追加</button>` : ""}
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>機材名</th><th>メーカー</th><th>型番</th><th>カテゴリ</th><th>数量</th><th>単価</th><th>状態</th><th>保管場所</th><th></th></tr></thead>
      <tbody>${rows||`<tr><td colspan="9" style="text-align:center;color:#999;padding:2rem">機材が登録されていません</td></tr>`}</tbody>
    </table></div>`;
}
window.eqFC = v => { eqFilter=v; renderEquipment(); };
window.eqCC = v => { eqCatFilter=v; renderEquipment(); };
window.openEqModal = function(key) {
  const e = key ? equipment[key] : {};
  showModal(`<div class="modal-title">${key?"機材編集":"機材追加"}</div>
    <div class="form-grid">
      ${[["name","機材名"],["maker","メーカー"],["model","型番"],["location","保管場所"],["serial","シリアル番号"]].map(([k,l])=>`<div><label>${l}</label><input id="eq-${k}" value="${e[k]||""}"></div>`).join("")}
      <div><label>カテゴリ</label><select id="eq-cat">${CATS.map(c=>`<option ${e.cat===c?"selected":""}>${c}</option>`).join("")}</select></div>
      <div><label>状態</label><select id="eq-status">${STATUSES.map(s=>`<option ${e.status===s?"selected":""}>${s}</option>`).join("")}</select></div>
      <div><label>数量</label><input type="number" id="eq-qty" value="${e.qty||1}" min="1"></div>
      <div><label>単価（日）</label><input type="number" id="eq-unitPrice" value="${e.unitPrice||0}" min="0"></div>
      <div><label>最終点検日</label><input type="date" id="eq-lastCheck" value="${e.lastCheck||""}"></div>
      <div><label>次回点検予定</label><input type="date" id="eq-nextCheck" value="${e.nextCheck||""}"></div>
    </div>
    <div class="form-row"><label>メモ</label><textarea id="eq-notes" style="height:60px">${e.notes||""}</textarea></div>

function getUsedQty(evKey, eqName) {
  const ev = events[evKey];
  if(!ev||!ev.items) return 0;
  return Object.values(ev.items).filter(i=>i.name===eqName).reduce((s,i)=>s+(i.qty||0),0);
}

window.eqSelectChange = function(evKey) {
  const eqKey = document.getElementById("item-eq").value;
  const qtyInput = document.getElementById("item-qty");
  const hint = document.getElementById("item-qty-hint");
  if(!eqKey) { qtyInput.max=""; if(hint) hint.textContent=""; return; }
  const eq = equipment[eqKey];
  const used = getUsedQty(evKey, eq.name);
  const available = Math.max(0,(eq.qty||0)-used);
  qtyInput.max = available;
  qtyInput.value = Math.min(parseInt(qtyInput.value)||1, available||1);
  if(hint) { hint.textContent = available>0?`残り${available}台`:"在庫なし"; hint.style.color=available>0?"#BA7517":"#A32D2D"; }
}

window.addItem = function(evKey) {
  const eqKey = document.getElementById("item-eq").value;
  if(!eqKey) return;
  const eq = equipment[eqKey];
  const used = getUsedQty(evKey, eq.name);
  const available = Math.max(0,(eq.qty||0)-used);
  if(available<=0) { alert(`「${eq.name}」はすでに在庫数（${eq.qty}台）をすべて追加済みです`); return; }
  const qty = Math.min(parseInt(document.getElementById("item-qty").value)||1, available);
  push(ref(db,"events/"+evKey+"/items"),{name:eq.name,model:eq.model||"",qty,days:parseInt(document.getElementById("item-days").value)||1,unitPrice:eq.unitPrice||0});
}

  const nw = document.getElementById("my-new-pass").value;
  const nw2 = document.getElementById("my-new-pass2").value;
  const msg = document.getElementById("my-pass-msg");
  const snap = await get(ref(db,"members/"+currentUser.id+"/password"));
  if(snap.val()!==cur) { msg.style.color="#c00"; msg.textContent="現在のパスワードが違います"; return; }
  if(!nw) { msg.style.color="#c00"; msg.textContent="新しいパスワードを入力してください"; return; }
  if(nw!==nw2) { msg.style.color="#c00"; msg.textContent="パスワードが一致しません"; return; }
  await set(ref(db,"members/"+currentUser.id+"/password"),nw);
  msg.style.color="#1D9E75"; msg.textContent="パスワードを変更しました";
  document.getElementById("my-cur-pass").value="";
  document.getElementById("my-new-pass").value="";
  document.getElementById("my-new-pass2").value="";
}

// ===== SETTINGS =====
function renderSettings() {
  const memberCards = Object.entries(members).map(([id,m])=>{
    const permToggles = m.role==="admin" ? `<div style="font-size:12px;color:#6b7a95;padding:8px 0">管理者はすべての権限を持ちます</div>` :
      PERMS.map(p=>`<div class="perm-toggle">
        <span>${p.label}</span>
        <label class="toggle"><input type="checkbox" ${m.permissions?.[p.key]?"checked":""} onchange="togglePerm('${id}','${p.key}',this.checked)"><span class="toggle-slider"></span></label>
      </div>`).join("");
    return `<div class="member-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="member-name">${m.name}</div>
          <div class="member-role">${m.role==="admin"?"管理者":"一般メンバー"}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="pw-display">${m.password||""}</span>
          <button class="action-btn" onclick="resetPass('${id}')">リセット</button>
          ${id!=="admin" ? `<button class="action-btn del" onclick="delMember('${id}')">削除</button>` : ""}
        </div>
      </div>
      <div style="margin-top:0.75rem;border-top:0.5px solid #f0f2f5;padding-top:0.75rem">${permToggles}</div>
    </div>`;
  }).join("");

  const presetItems = presets.map((p,i)=>`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input id="preset-${i}" value="${p}" style="flex:1">
      <button class="action-btn del" onclick="delPreset(${i})">削除</button>
    </div>`).join("");

  document.getElementById("main-content").innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem">
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
          <span style="font-weight:600;font-size:14px">メンバー管理</span>
          <button class="primary-btn" onclick="openAddMemberModal()">+ メンバー追加</button>
        </div>
        ${memberCards}
      </div>
      <div>
        <div class="card">
          <div class="card-title">費用項目プリセット</div>
          ${presetItems}
          <div style="display:flex;gap:8px;margin-top:8px">
            <input id="new-preset" placeholder="新しい項目名" style="flex:1">
            <button class="primary-btn" onclick="addPreset()">追加</button>
          </div>
          <button class="primary-btn" style="width:100%;margin-top:10px" onclick="savePresets()">保存</button>
          <div id="preset-msg" style="font-size:13px;color:#1D9E75;margin-top:6px"></div>
        </div>
      </div>
    </div>`;
}

window.openAddMemberModal = function() {
  showModal(`<div class="modal-title">メンバーを追加</div>
    <div class="form-row"><label>名前</label><input id="new-name" placeholder="名前を入力"></div>
    <div class="form-row"><label>パスワード</label><input id="new-pw" placeholder="初期パスワード"></div>
    <div class="form-row"><label>ロール</label>
      <select id="new-role"><option value="member">一般メンバー</option><option value="admin">管理者</option></select>
    </div>
    <div class="modal-footer"><button onclick="closeModal()">キャンセル</button><button class="primary-btn" onclick="addMember()">追加</button></div>`);
}
window.addMember = function() {
  const name = V("new-name");
  const pw = V("new-pw");
  const role = V("new-role");
  if(!name||!pw) return;
  push(ref(db,"members"),{name,password:pw,role,permissions:{}});
  closeModal();
}
window.delMember = function(id) { if(confirm("削除しますか？")) remove(ref(db,"members/"+id)); }
window.togglePerm = function(id,key,val) { set(ref(db,"members/"+id+"/permissions/"+key),val); }
window.resetPass = function(id) {
  const newPw = prompt("新しいパスワードを入力してください：");
  if(!newPw) return;
  set(ref(db,"members/"+id+"/password"),newPw);
}
window.addPreset = function() { const v=V("new-preset").trim(); if(!v) return; presets=[...presets,v]; renderSettings(); }
window.delPreset = function(i) { presets=presets.filter((_,j)=>j!==i); renderSettings(); }
window.savePresets = async function() {
  await set(ref(db,"presets"),presets.reduce((o,p,i)=>(o[i]=p,o),{}));
  const m=document.getElementById("preset-msg");
  if(m){m.textContent="保存しました";setTimeout(()=>m.textContent="",2000);}
}

// ===== HELPERS =====
function V(id) { const el=document.getElementById(id); return el?el.value:""; }
function showModal(html) {
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  bg.onclick = () => bg.remove();
  document.getElementById("modal-container").appendChild(bg);
}
window.closeModal = function() { const m=document.querySelector(".modal-bg"); if(m) m.remove(); }

initDefaults();
</script>
</body>
</html>
