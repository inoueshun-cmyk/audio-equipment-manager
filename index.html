<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音響機材管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f0}
button{cursor:pointer;border:1px solid #ccc;background:#fff;border-radius:6px;padding:5px 12px;font-size:13px}
button:hover{background:#f0f0f0}
input,select,textarea{border:1px solid #ccc;border-radius:6px;padding:6px 10px;font-size:13px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:#555}
label{font-size:12px;color:#666;display:block;margin-bottom:3px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 10px;text-align:left;color:#666;font-weight:500;border-bottom:1px solid #ddd}
td{padding:8px 10px;border-bottom:1px solid #eee}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;color:#fff}
.nav{background:#fff;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;padding:0 1rem;gap:1rem;position:sticky;top:0;z-index:10}
.nav-title{font-weight:500;font-size:15px;padding:0.75rem 0;margin-right:0.5rem}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;padding:0.65rem 0;font-size:13px;color:#666;border-radius:0}
.nav-btn:hover{background:none;color:#1a1a1a}
.nav-btn.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.content{padding:1.25rem;max-width:1100px;margin:0 auto}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:#f5f5f0;border-radius:8px;padding:1rem}
.metric-label{font-size:12px;color:#666;margin-bottom:4px}
.metric-val{font-size:22px;font-weight:500}
.alert-box{background:#faeeda;border:1px solid #fac775;border-radius:8px;padding:1rem;margin-bottom:1rem}
.alert-title{font-weight:500;font-size:13px;color:#633806;margin-bottom:6px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:10px;padding:1.5rem;width:480px;max-height:85vh;overflow-y:auto}
.modal-title{font-weight:500;font-size:15px;margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row{margin-bottom:10px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.ev-list{display:flex;flex-direction:column;gap:8px}
.ev-item{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 12px;cursor:pointer}
.ev-item:hover,.ev-item.active{background:#f5f5f0}
.ev-name{font-weight:500;font-size:13px}
.ev-meta{font-size:12px;color:#666;margin-top:2px}
.two-col{display:grid;grid-template-columns:280px 1fr;gap:1rem}
.loading{text-align:center;padding:2rem;color:#999}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
@media print{.no-print{display:none!important}.print-area{border:none!important}}
</style>
</head>
<body>

<div class="nav">
  <span class="nav-title">音響機材管理</span>
  <button class="nav-btn active" onclick="showTab('dashboard')">ダッシュボード</button>
  <button class="nav-btn" onclick="showTab('equipment')">機材マスタ</button>
  <button class="nav-btn" onclick="showTab('events')">イベント管理</button>
  <button class="nav-btn" onclick="showTab('quote')">見積書</button>
  <button class="nav-btn" onclick="showTab('maintenance')">メンテナンス</button>
  <span id="sync-status" style="margin-left:auto;font-size:11px;color:#999"></span>
</div>

<div class="content">
  <div id="tab-dashboard"></div>
  <div id="tab-equipment" style="display:none"></div>
  <div id="tab-events" style="display:none"></div>
  <div id="tab-quote" style="display:none"></div>
  <div id="tab-maintenance" style="display:none"></div>
</div>

<div id="modal-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC4CXb9hXIZhAbgHHNdOl65lf2gfM3E6OA",
  authDomain: "audio-equipment-manager.firebaseapp.com",
  databaseURL: "https://audio-equipment-manager-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "audio-equipment-manager",
  storageBucket: "audio-equipment-manager.firebasestorage.app",
  messagingSenderId: "560991550177",
  appId: "1:560991550177:web:YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== STATE =====
let equipment = {};
let events = {};
let maintenance = {};
let currentTab = "dashboard";
let selectedEventId = null;
let quoteEventId = null;

const CATS = ["入力系","処理系","出力系","周辺"];
const STATUSES = ["良好","要注意","要修理","故障"];
const STATUS_COLOR = {"良好":"#1D9E75","要注意":"#BA7517","要修理":"#D85A30","故障":"#A32D2D"};
const TODAY = new Date().toISOString().slice(0,10);

// ===== FIREBASE LISTENERS =====
function syncStatus(msg) {
  document.getElementById("sync-status").textContent = msg;
  if(msg === "✓ 同期済み") setTimeout(()=>document.getElementById("sync-status").textContent="", 2000);
}

onValue(ref(db,"equipment"), snap => {
  equipment = snap.val() || {};
  renderCurrentTab();
  syncStatus("✓ 同期済み");
});
onValue(ref(db,"events"), snap => { events = snap.val() || {}; renderCurrentTab(); });
onValue(ref(db,"maintenance"), snap => { maintenance = snap.val() || {}; renderCurrentTab(); });

// ===== TAB ROUTING =====
window.showTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  ["dashboard","equipment","events","quote","maintenance"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t===tab ? "" : "none";
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  if(currentTab==="dashboard") renderDashboard();
  else if(currentTab==="equipment") renderEquipment();
  else if(currentTab==="events") renderEvents();
  else if(currentTab==="quote") renderQuote();
  else if(currentTab==="maintenance") renderMaintenance();
}

// ===== DASHBOARD =====
function renderDashboard() {
  const eqArr = Object.values(equipment);
  const totalAsset = eqArr.reduce((s,e)=>s+(e.qty||0)*(e.unitPrice||0),0);
  const needRepair = eqArr.filter(e=>e.status==="要修理"||e.status==="故障").length;
  const evArr = Object.values(events);
  const upcoming = evArr.filter(e=>e.date>=TODAY).length;
  const alerts = eqArr.filter(e=>e.nextCheck&&e.nextCheck<=TODAY);

  let catBars = CATS.map(c=>{
    const cnt = eqArr.filter(e=>e.cat===c).reduce((s,e)=>s+(e.qty||0),0);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="width:72px;font-size:12px;color:#666">${c}</div>
      <div style="flex:1;background:#eee;border-radius:4px;height:10px">
        <div style="width:${Math.min(100,cnt*8)}%;background:#378ADD;border-radius:4px;height:10px"></div>
      </div>
      <div style="font-size:12px;width:24px;text-align:right">${cnt}</div>
    </div>`;
  }).join("");

  let statusRows = STATUSES.map(s=>{
    const cnt = eqArr.filter(e=>e.status===s).length;
    return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee">
      <span><span class="status-dot" style="background:${STATUS_COLOR[s]}"></span>${s}</span>
      <span style="font-weight:500">${cnt}件</span>
    </div>`;
  }).join("");

  let alertHtml = alerts.length ? `<div class="alert-box">
    <div class="alert-title">点検期限アラート（${alerts.length}件）</div>
    ${alerts.map(e=>`<div style="font-size:12px;color:#633806;margin-bottom:3px">・${e.name}（${e.model||""}）— 次回点検: ${e.nextCheck}</div>`).join("")}
  </div>` : "";

  document.getElementById("tab-dashboard").innerHTML = `
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">総機材種類</div><div class="metric-val">${eqArr.length}種</div></div>
      <div class="metric"><div class="metric-label">資産総額（概算）</div><div class="metric-val" style="font-size:16px">¥${totalAsset.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">要対応（修理・故障）</div><div class="metric-val" style="color:${needRepair>0?"#D85A30":"inherit"}">${needRepair}件</div></div>
      <div class="metric"><div class="metric-label">今後のイベント</div><div class="metric-val">${upcoming}件</div></div>
      <div class="metric"><div class="metric-label">点検アラート</div><div class="metric-val" style="color:${alerts.length>0?"#BA7517":"inherit"}">${alerts.length}件</div></div>
    </div>
    ${alertHtml}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <div class="card"><div style="font-weight:500;margin-bottom:12px">カテゴリ別機材数</div>${catBars}</div>
      <div class="card"><div style="font-weight:500;margin-bottom:12px">状態サマリー</div>${statusRows}</div>
    </div>`;
}

// ===== EQUIPMENT =====
let eqFilter = "";
let eqCatFilter = "すべて";

function renderEquipment() {
  const eqArr = Object.entries(equipment);
  const filtered = eqArr.filter(([k,e])=>{
    const q = eqFilter.toLowerCase();
    const matchQ = !q||(e.name||"").includes(q)||(e.maker||"").includes(q)||(e.model||"").includes(q);
    const matchC = eqCatFilter==="すべて"||e.cat===eqCatFilter;
    return matchQ&&matchC;
  });

  const rows = filtered.map(([k,e])=>`
    <tr>
      <td style="font-weight:500">${e.name||""}</td>
      <td style="color:#666">${e.maker||""}</td>
      <td style="color:#666">${e.model||""}</td>
      <td><span style="background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:12px">${e.cat||""}</span></td>
      <td style="text-align:center">${e.qty||0}</td>
      <td style="text-align:right">¥${(e.unitPrice||0).toLocaleString()}</td>
      <td><span class="badge" style="background:${STATUS_COLOR[e.status]||"#999"}">${e.status||""}</span></td>
      <td style="color:#666">${e.location||""}</td>
      <td>
        <button style="font-size:11px;padding:2px 8px;margin-right:4px" onclick="openEqModal('${k}')">編集</button>
        <button style="font-size:11px;padding:2px 8px;color:#c00" onclick="deleteEq('${k}')">削除</button>
      </td>
    </tr>`).join("");

  document.getElementById("tab-equipment").innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center">
      <input placeholder="機材名・型番で検索" value="${eqFilter}" oninput="eqFilterChange(this.value)" style="flex:1;min-width:160px">
      <select onchange="eqCatFilterChange(this.value)" style="width:120px">
        <option ${eqCatFilter==="すべて"?"selected":""}>すべて</option>
        ${CATS.map(c=>`<option ${eqCatFilter===c?"selected":""}>${c}</option>`).join("")}
      </select>
      <button onclick="openEqModal(null)" style="white-space:nowrap">+ 機材追加</button>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>機材名</th><th>メーカー</th><th>型番</th><th>カテゴリ</th>
          <th>数量</th><th>単価</th><th>状態</th><th>保管場所</th><th>操作</th>
        </tr></thead>
        <tbody>${rows||`<tr><td colspan="9" style="text-align:center;color:#999;padding:2rem">機材が登録されていません</td></tr>`}</tbody>
      </table>
    </div>`;
}

window.eqFilterChange = v => { eqFilter=v; renderEquipment(); };
window.eqCatFilterChange = v => { eqCatFilter=v; renderEquipment(); };

window.openEqModal = function(key) {
  const e = key ? equipment[key] : {};
  const html = `<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">${key?"機材編集":"機材追加"}</div>
    <div class="form-grid">
      ${["name:機材名","maker:メーカー","model:型番","location:保管場所","serial:シリアル番号"].map(f=>{
        const [k,l]=f.split(":");
        return `<div><label>${l}</label><input id="eq-${k}" value="${e[k]||""}"></div>`;
      }).join("")}
      <div><label>カテゴリ</label><select id="eq-cat">${CATS.map(c=>`<option ${e.cat===c?"selected":""}>${c}</option>`).join("")}</select></div>
      <div><label>状態</label><select id="eq-status">${STATUSES.map(s=>`<option ${e.status===s?"selected":""}>${s}</option>`).join("")}</select></div>
      <div><label>数量</label><input type="number" id="eq-qty" value="${e.qty||1}" min="1"></div>
      <div><label>レンタル単価（日）</label><input type="number" id="eq-unitPrice" value="${e.unitPrice||0}" min="0"></div>
      <div><label>最終点検日</label><input type="date" id="eq-lastCheck" value="${e.lastCheck||""}"></div>
      <div><label>次回点検予定</label><input type="date" id="eq-nextCheck" value="${e.nextCheck||""}"></div>
    </div>
    <div class="form-row"><label>メモ</label><textarea id="eq-notes" style="height:60px">${e.notes||""}</textarea></div>
    <div class="modal-footer">
      <button onclick="closeModal()">キャンセル</button>
      <button style="font-weight:500" onclick="saveEq('${key||""}')">保存</button>
    </div>
  </div>`;
  showModal(html);
}

window.saveEq = function(key) {
  const data = {
    name: document.getElementById("eq-name").value,
    maker: document.getElementById("eq-maker").value,
    model: document.getElementById("eq-model").value,
    location: document.getElementById("eq-location").value,
    serial: document.getElementById("eq-serial").value,
    cat: document.getElementById("eq-cat").value,
    status: document.getElementById("eq-status").value,
    qty: parseInt(document.getElementById("eq-qty").value)||1,
    unitPrice: parseInt(document.getElementById("eq-unitPrice").value)||0,
    lastCheck: document.getElementById("eq-lastCheck").value,
    nextCheck: document.getElementById("eq-nextCheck").value,
    notes: document.getElementById("eq-notes").value,
  };
  if(!data.name) return;
  if(key) set(ref(db,"equipment/"+key), data);
  else push(ref(db,"equipment"), data);
  closeModal();
}

window.deleteEq = function(key) {
  if(confirm("削除しますか？")) remove(ref(db,"equipment/"+key));
}

// ===== EVENTS =====
function renderEvents() {
  const evArr = Object.entries(events);
  const list = evArr.map(([k,e])=>`
    <div class="ev-item ${selectedEventId===k?"active":""}" onclick="selectEvent('${k}')">
      <div class="ev-name">${e.name||""}</div>
      <div class="ev-meta">${e.date||""}${e.endDate&&e.endDate!==e.date?" 〜 "+e.endDate:""}</div>
      <div class="ev-meta">${e.client||""}</div>
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        <span style="font-size:11px;background:#f0f0f0;padding:1px 6px;border-radius:4px">${e.status||""}</span>
        <div>
          <button style="font-size:11px;padding:1px 6px;margin-right:3px" onclick="event.stopPropagation();openEvModal('${k}')">編集</button>
          <button style="font-size:11px;padding:1px 6px;color:#c00" onclick="event.stopPropagation();deleteEv('${k}')">削除</button>
        </div>
      </div>
    </div>`).join("");

  const ev = selectedEventId ? events[selectedEventId] : null;
  const items = ev?.items || {};
  const itemArr = Object.entries(items);
  const subtotal = itemArr.reduce((s,[,i])=>s+(i.qty||0)*(i.days||0)*(i.unitPrice||0),0);

  const eqOptions = Object.entries(equipment).map(([k,e])=>`<option value="${k}">${e.name}（${e.model||""}）</option>`).join("");

  const itemRows = itemArr.map(([ik,i])=>`
    <tr>
      <td>${i.name||""}</td><td style="color:#666">${i.model||""}</td>
      <td style="text-align:center">${i.qty||0}</td><td style="text-align:center">${i.days||0}</td>
      <td style="text-align:right">¥${(i.unitPrice||0).toLocaleString()}</td>
      <td style="text-align:right;font-weight:500">¥${((i.qty||0)*(i.days||0)*(i.unitPrice||0)).toLocaleString()}</td>
      <td><button style="font-size:11px;color:#c00" onclick="removeItem('${selectedEventId}','${ik}')">削除</button></td>
    </tr>`).join("");

  const detail = ev ? `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
        <div>
          <div style="font-weight:500;font-size:15px">${ev.name||""}</div>
          <div style="font-size:12px;color:#666;margin-top:3px">${ev.client||""} ／ ${ev.date||""}${ev.endDate&&ev.endDate!==ev.date?" 〜 "+ev.endDate:""}</div>
        </div>
        <button style="font-weight:500" onclick="goToQuote('${selectedEventId}')">見積書を作成 ↗</button>
      </div>
      <div style="font-weight:500;margin-bottom:8px">機材リスト</div>
      <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:flex-end">
        <div><label>機材</label><select id="item-eq" style="width:200px"><option value="">選択</option>${eqOptions}</select></div>
        <div><label>数量</label><input type="number" id="item-qty" value="1" min="1" style="width:60px"></div>
        <div><label>日数</label><input type="number" id="item-days" value="1" min="1" style="width:60px"></div>
        <button onclick="addItem('${selectedEventId}')">追加</button>
      </div>
      ${itemArr.length ? `
        <div style="overflow-x:auto"><table>
          <thead><tr><th>機材名</th><th>型番</th><th>数量</th><th>日数</th><th>単価</th><th>小計</th><th></th></tr></thead>
          <tbody>${itemRows}
            <tr style="border-top:2px solid #ddd">
              <td colspan="5" style="text-align:right;font-weight:500">合計</td>
              <td style="text-align:right;font-weight:500;font-size:15px">¥${subtotal.toLocaleString()}</td><td></td>
            </tr>
          </tbody>
        </table></div>` : `<div style="color:#999;padding:1rem 0;font-size:13px">機材がまだ追加されていません</div>`}
    </div>` : `<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#999;font-size:13px">左からイベントを選択してください</div>`;

  document.getElementById("tab-events").innerHTML = `
    <div class="two-col">
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-weight:500">イベント一覧</span>
          <button style="font-size:12px" onclick="openEvModal(null)">+ 追加</button>
        </div>
        <div class="ev-list">${list||`<div style="color:#999;font-size:13px;padding:1rem 0">イベントがありません</div>`}</div>
      </div>
      <div>${detail}</div>
    </div>`;
}

window.selectEvent = function(key) { selectedEventId=key; renderEvents(); }

window.openEvModal = function(key) {
  const e = key ? events[key] : {};
  const html = `<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">${key?"イベント編集":"イベント追加"}</div>
    <div class="form-row"><label>イベント名</label><input id="ev-name" value="${e.name||""}"></div>
    <div class="form-row"><label>クライアント名</label><input id="ev-client" value="${e.client||""}"></div>
    <div class="form-grid">
      <div><label>開始日</label><input type="date" id="ev-date" value="${e.date||""}"></div>
      <div><label>終了日</label><input type="date" id="ev-endDate" value="${e.endDate||""}"></div>
    </div>
    <div class="form-row"><label>ステータス</label>
      <select id="ev-status">
        ${["準備中","実施済み","キャンセル"].map(s=>`<option ${e.status===s?"selected":""}>${s}</option>`).join("")}
      </select>
    </div>
    <div class="form-row"><label>備考</label><textarea id="ev-notes" style="height:60px">${e.notes||""}</textarea></div>
    <div class="modal-footer">
      <button onclick="closeModal()">キャンセル</button>
      <button style="font-weight:500" onclick="saveEv('${key||""}')">保存</button>
    </div>
  </div>`;
  showModal(html);
}

window.saveEv = function(key) {
  const data = {
    name: document.getElementById("ev-name").value,
    client: document.getElementById("ev-client").value,
    date: document.getElementById("ev-date").value,
    endDate: document.getElementById("ev-endDate").value,
    status: document.getElementById("ev-status").value,
    notes: document.getElementById("ev-notes").value,
  };
  if(!data.name) return;
  if(key) {
    const existing = events[key] || {};
    set(ref(db,"events/"+key), {...existing, ...data});
  } else {
    push(ref(db,"events"), {...data, items:{}});
  }
  closeModal();
}

window.deleteEv = function(key) {
  if(confirm("削除しますか？")) { remove(ref(db,"events/"+key)); if(selectedEventId===key) selectedEventId=null; }
}

window.addItem = function(evKey) {
  const eqKey = document.getElementById("item-eq").value;
  if(!eqKey) return;
  const eq = equipment[eqKey];
  const qty = parseInt(document.getElementById("item-qty").value)||1;
  const days = parseInt(document.getElementById("item-days").value)||1;
  push(ref(db,"events/"+evKey+"/items"), {
    name: eq.name, model: eq.model||"", qty, days, unitPrice: eq.unitPrice||0
  });
}

window.removeItem = function(evKey, itemKey) {
  remove(ref(db,"events/"+evKey+"/items/"+itemKey));
}

window.goToQuote = function(evKey) {
  quoteEventId = evKey;
  document.querySelector('.nav-btn[onclick="showTab(\'quote\')"]').click();
}

// ===== QUOTE =====
let quoteCompany = "株式会社〇〇音響";
let quoteClient = "";
let quoteDate = TODAY;
let quoteTax = 10;
let quoteNote = "・機材の搬入・搬出時間は別途ご相談ください。\n・天候等により内容が変更になる場合がございます。";

function renderQuote() {
  const evOptions = Object.entries(events).map(([k,e])=>`<option value="${k}" ${quoteEventId===k?"selected":""}>${e.name}</option>`).join("");
  const ev = quoteEventId ? events[quoteEventId] : null;
  if(ev && !quoteClient) quoteClient = ev.client||"";
  const items = ev ? Object.values(ev.items||{}) : [];
  const subtotal = items.reduce((s,i)=>s+(i.qty||0)*(i.days||0)*(i.unitPrice||0),0);
  const tax = Math.round(subtotal*quoteTax/100);
  const total = subtotal+tax;

  const itemRows = items.map(i=>`
    <tr>
      <td>${i.name||""}</td><td style="color:#666">${i.model||""}</td>
      <td style="text-align:center">${i.qty}</td><td style="text-align:center">${i.days}</td>
      <td style="text-align:right">¥${(i.unitPrice||0).toLocaleString()}</td>
      <td style="text-align:right;font-weight:500">¥${((i.qty||0)*(i.days||0)*(i.unitPrice||0)).toLocaleString()}</td>
    </tr>`).join("");

  document.getElementById("tab-quote").innerHTML = `
    <div class="no-print" style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:flex-end">
      <div><label>イベント選択</label><select onchange="quoteEvChange(this.value)" style="width:220px"><option value="">選択</option>${evOptions}</select></div>
      <div><label>発行会社名</label><input value="${quoteCompany}" oninput="quoteCompany=this.value;renderQuote()" style="width:200px"></div>
      <div><label>宛先</label><input value="${quoteClient}" oninput="quoteClient=this.value;renderQuote()" placeholder="〇〇様" style="width:160px"></div>
      <div><label>発行日</label><input type="date" value="${quoteDate}" oninput="quoteDate=this.value;renderQuote()" style="width:140px"></div>
      <div><label>消費税率%</label><input type="number" value="${quoteTax}" oninput="quoteTax=parseInt(this.value)||0;renderQuote()" style="width:60px"></div>
      <button style="font-weight:500" onclick="window.print()">印刷 / PDF保存</button>
    </div>
    <div class="print-area card" style="max-width:720px">
      <div style="display:flex;justify-content:space-between;margin-bottom:2rem">
        <div>
          <div style="font-size:22px;font-weight:500;margin-bottom:8px">見 積 書</div>
          <div style="font-size:14px">${quoteClient||"　　　　　"} 御中</div>
        </div>
        <div style="text-align:right;font-size:13px;color:#666">
          <div style="font-weight:500;font-size:14px;color:#1a1a1a;margin-bottom:4px">${quoteCompany}</div>
          <div>発行日：${quoteDate}</div>
          ${ev?`<div>案件：${ev.name||""}</div><div>日程：${ev.date||""}${ev.endDate&&ev.endDate!==ev.date?" 〜 "+ev.endDate:""}</div>`:""}
        </div>
      </div>
      <div style="background:#f5f5f0;border-radius:8px;padding:1rem;margin-bottom:1.5rem;display:flex;align-items:baseline;gap:12px">
        <span style="font-size:13px;color:#666">お見積金額（税込）</span>
        <span style="font-size:26px;font-weight:500">¥${total.toLocaleString()}</span>
      </div>
      <table style="margin-bottom:1.5rem">
        <thead><tr style="background:#f5f5f0">
          <th>品目</th><th>型番</th><th style="text-align:center">数量</th><th style="text-align:center">日数</th>
          <th style="text-align:right">単価（日）</th><th style="text-align:right">金額</th>
        </tr></thead>
        <tbody>
          ${itemRows||`<tr><td colspan="6" style="text-align:center;color:#999;padding:1rem">イベントを選択してください</td></tr>`}
          <tr><td colspan="5" style="text-align:right;color:#666">小計</td><td style="text-align:right">¥${subtotal.toLocaleString()}</td></tr>
          <tr><td colspan="5" style="text-align:right;color:#666">消費税（${quoteTax}%）</td><td style="text-align:right">¥${tax.toLocaleString()}</td></tr>
          <tr style="background:#f5f5f0"><td colspan="5" style="text-align:right;font-weight:500">合計（税込）</td><td style="text-align:right;font-weight:500;font-size:15px">¥${total.toLocaleString()}</td></tr>
        </tbody>
      </table>
      <div style="font-size:13px;color:#666;margin-bottom:4px">備考</div>
      <textarea class="no-print" oninput="quoteNote=this.value" style="width:100%;height:80px;font-size:13px">${quoteNote}</textarea>
      <div style="font-size:13px;white-space:pre-wrap;display:none" id="quote-note-print">${quoteNote}</div>
    </div>`;
}

window.quoteEvChange = function(key) { quoteEventId=key||null; quoteClient=key&&events[key]?events[key].client||"":""; renderQuote(); }

// ===== MAINTENANCE =====
function renderMaintenance() {
  const today = TODAY;
  const eqArr = Object.values(equipment);
  const overdue = eqArr.filter(e=>e.nextCheck&&e.nextCheck<=today);
  const mtArr = Object.entries(maintenance).sort((a,b)=>b[1].date?.localeCompare(a[1].date||"")||0);
  const eqOptions = Object.entries(equipment).map(([k,e])=>`<option value="${k}">${e.name}（${e.model||""}）</option>`).join("");

  const mtRows = mtArr.map(([k,m])=>`
    <tr>
      <td>${m.date||""}</td>
      <td style="font-weight:500">${m.eqName||""}</td>
      <td style="color:#666">${m.model||""}</td>
      <td><span class="badge" style="background:${STATUS_COLOR[m.status]||"#999"}">${m.status||""}</span></td>
      <td style="color:#666">${m.notes||""}</td>
    </tr>`).join("");

  const overdueHtml = overdue.length ? `<div class="alert-box">
    <div class="alert-title">点検期限が来ている機材（${overdue.length}件）</div>
    ${overdue.map(e=>`<div style="font-size:12px;color:#633806;margin-bottom:3px;display:flex;gap:12px"><span>${e.name}（${e.model||""}）</span><span style="color:#854F0B">期限: ${e.nextCheck}</span></div>`).join("")}
  </div>` : "";

  document.getElementById("tab-maintenance").innerHTML = `
    ${overdueHtml}
    <div class="card" style="margin-bottom:1rem">
      <div style="font-weight:500;margin-bottom:1rem">点検記録を追加</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
        <div><label>機材</label><select id="mt-eq" style="width:200px"><option value="">選択</option>${eqOptions}</select></div>
        <div><label>点検日</label><input type="date" id="mt-date" value="${today}" style="width:140px"></div>
        <div><label>点検後状態</label><select id="mt-status" style="width:120px">${STATUSES.map(s=>`<option>${s}</option>`).join("")}</select></div>
        <div style="flex:1;min-width:160px"><label>メモ</label><input id="mt-notes"></div>
        <button style="font-weight:500" onclick="saveMt()">記録</button>
      </div>
    </div>
    <div style="font-weight:500;margin-bottom:8px">点検履歴</div>
    ${mtArr.length ? `<table><thead><tr><th>日付</th><th>機材名</th><th>型番</th><th>状態</th><th>メモ</th></tr></thead><tbody>${mtRows}</tbody></table>`
    : `<div style="color:#999;font-size:13px;padding:1rem 0">まだ記録がありません</div>`}`;
}

window.saveMt = function() {
  const eqKey = document.getElementById("mt-eq").value;
  if(!eqKey) return;
  const eq = equipment[eqKey];
  const date = document.getElementById("mt-date").value;
  const status = document.getElementById("mt-status").value;
  const notes = document.getElementById("mt-notes").value;
  if(!date) return;
  push(ref(db,"maintenance"), {eqName:eq.name, model:eq.model||"", date, status, notes});
  update(ref(db,"equipment/"+eqKey), {status, lastCheck:date});
  document.getElementById("mt-notes").value="";
}

// ===== MODAL HELPERS =====
function showModal(html) {
  const bg = document.createElement("div");
  bg.className="modal-bg";
  bg.innerHTML=html;
  bg.onclick=()=>bg.remove();
  document.getElementById("modal-container").appendChild(bg);
}
window.closeModal = function() {
  const m = document.querySelector(".modal-bg");
  if(m) m.remove();
}

// ===== INIT =====
renderDashboard();
</script>
</body>
</html>
